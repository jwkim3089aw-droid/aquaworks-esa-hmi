version: '3.8'

services:
  influxdb:
    image: influxdb:2.7
    container_name: esa_influxdb
    restart: always
    ports:
      - "8087:8086"
    volumes:
      - influxdb_data_dev:/var/lib/influxdb2
    environment:
      # 초기 설정 자동화 (최초 실행 시에만 적용됨)
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=password1234
      - DOCKER_INFLUXDB_INIT_ORG=esa_org
      - DOCKER_INFLUXDB_INIT_BUCKET=sensor_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-token

volumes:
  influxdb_data_dev:

# alembic.ini
[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# 타임존 및 파일명 템플릿 (옵션)
timezone = Asia/Seoul
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# 기본 URL (env.py에서 덮어씌워지지만 폴백용으로 둠)
sqlalchemy.url = sqlite+aiosqlite:///./.data/esa_hmi.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
